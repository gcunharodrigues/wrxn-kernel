name: wrxn-ci

# The single required status check the `wrxn-main-gate` branch ruleset gates on (ADR 0007). This is the
# KERNEL's OWN self-host CI — the kernel repo is NOT a wrxn install (no wrxn.install.json / .synapse/manifest),
# so the kernel-universal `wrxn ci` step is deliberately omitted: it hard-fails on a non-install repo (absent
# .synapse/manifest), exactly as documented for recon-wrxn in the gate-06 runbook. The kernel's real gate is
# its OWN suite (`npm test` — 783 checks), far stronger than the universal backstop, which exists only to give
# a no-suite INSTALL a real gate. (The generic payload template payload/.github/workflows/wrxn-ci.yml keeps the
# universal step because it lands in installs, which DO have a managed surface to verify.)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  wrxn-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: install dependencies
        run: npm ci
      - name: test (the real gate — the kernel's own suite)
        run: npm test
