name: release

# Publish to npm via OIDC trusted publishing when a release tag is pushed.
# No NPM_TOKEN: the GitHub Actions OIDC identity authenticates against the
# trusted-publisher config registered on npmjs.com for this package.
# Requires: npm CLI >= 11.5.1 (node 24 + the explicit upgrade below) and the
# id-token: write permission. Emits provenance + publishes the scoped package
# publicly (publishConfig.provenance / access).

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm publish
